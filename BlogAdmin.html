<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Management Dashboard</title>

    <!-- SEO -->
    <meta name="description" content="Manage blog posts, categories, tags, and SEO settings.">
    <meta name="keywords" content="blog, CMS, SEO, content management">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #333;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #111827;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 12px 0;
            cursor: pointer;
        }

        .sidebar li:hover {
            color: #60a5fa;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .header {
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        textarea {
            min-height: 250px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .btn-primary {
            background: #2563eb;
        }

        .btn-success {
            background: #16a34a;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        h3 {
            margin-bottom: 15px;
        }

        .seo-section {
            margin-top: 30px;
            border-top: 1px solid #e5e7eb;
            padding-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Blog Admin</h2>

        <ul>
            <li>📄 All Posts</li>
            <li>➕ Add New Post</li>
            <li>📂 Categories</li>
            <li>🏷 Tags</li>
            <li>⚙ SEO Settings</li>
        </ul>
    </aside>

    <main class="content">

        <div class="header">
            <h1>Create Blog Post</h1>
            <p>Manage your blog content and SEO settings.</p>
        </div>

        <div class="card">

            <div class="form-group">
                <label>Post Title</label>
                <input type="text" placeholder="Enter title">
            </div>

            <div class="form-group">
                <label>Slug</label>
                <input type="text" placeholder="how-to-improve-seo">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Category</label>
                    <select>
                        <option>Select Category</option>
                        <option>SEO</option>
                        <option>Web Design</option>
                        <option>Marketing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option>Draft</option>
                        <option>Published</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <input type="text" placeholder="seo, marketing, website">
            </div>

            <div class="form-group">
                <label>Featured Image URL</label>
                <input type="text" placeholder="https://image-url.com/image.jpg">
            </div>

            <div class="form-group">
                <label>Excerpt</label>
                <textarea placeholder="Short summary of the article"></textarea>
            </div>

            <div class="form-group">
                <label>Article Content</label>
                <textarea placeholder="Write your blog content here..."></textarea>
            </div>

            <div class="seo-section">
                <h3>SEO Settings</h3>

                <div class="form-group">
                    <label>Meta Title</label>
                    <input type="text" placeholder="SEO optimized title">
                </div>

                <div class="form-group">
                    <label>Meta Description</label>
                    <textarea placeholder="SEO description"></textarea>
                </div>

                <div class="form-group">
                    <label>Keywords</label>
                    <input type="text" placeholder="seo, website design, marketing">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary">Save Draft</button>
                <button class="btn btn-success">Publish Post</button>
            </div>

        </div>

    </main>

</div>

</body>
</html>
